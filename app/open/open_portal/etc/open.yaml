Name: open_portal
Host: 0.0.0.0
Port: 22000
Etcd: 127.0.0.1:2379

# CORS 配置
CORS:
  AllowOrigin: '*'
  AllowMethods: 'GET,POST,PUT,DELETE,OPTIONS'
  AllowHeaders: 'Content-Type,Token,deviceId,Authorization'
  ExposeHeaders: 'Content-Length,Access-Control-Allow-Origin,Access-Control-Allow-Headers,Access-Control-Allow-Methods'
  MaxAge: 86400
  AllowCredentials: true

Mysql:
  DataSource: root:123456@tcp(127.0.0.1:3306)/beaver_open?charset=utf8mb4&parseTime=true&loc=Local

Auth:
  AccessSecret: robert
  AccessExpire: 43200

UserRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: userrpc.rpc
AuthRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: authrpc.rpc

# OAuth 授权页面配置
OAuth:
  BaseUrl: http://127.0.0.1:5173

# 门户自身 OAuth 客户端（code 换 token 在服务端完成，appSecret 不下发前端）
PortalOAuth:
  AppId: app_2db39e38
  GatewayUrl: http://127.0.0.1:20800

# open_api 对外地址（Incoming Webhook 推送入口）
ApiBaseUrl: http://127.0.0.1:21900
