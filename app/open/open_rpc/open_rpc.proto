syntax = "proto3"; //指定proto版本
package open_rpc;

option go_package = "./open_rpc";

// ==================== OAuth 服务定义 ====================

// 用授权码换取 Token 请求
message ExchangeTokenReq {
  string app_id = 1; // 应用 ID
  string code = 2; // 授权码
}

message ExchangeTokenRes {
  string access_token = 1; // 访问令牌
  string refresh_token = 2; // 刷新令牌
  int64 expires_in = 3; // 过期时间（秒）
  string token_type = 4; // Token 类型（Bearer）
  string user_id = 5; // 用户 ID
}

// 获取用户信息请求
message GetUserInfoReq {
  string access_token = 1; // 访问令牌
}

message GetUserInfoRes {
  string user_id = 1; // 用户 ID
  string nick_name = 2; // 昵称
  string avatar = 3; // 头像 URL
  string phone = 4; // 手机号
  string email = 5; // 邮箱
}

// 验证 Token 请求
message ValidateTokenReq {
  string access_token = 1; // 访问令牌
}

message ValidateTokenRes {
  bool valid = 1; // 是否有效
  string user_id = 2; // 用户 ID（如果有效）
  string app_id = 3; // 应用 ID
}

// 刷新 Token 请求
message RefreshTokenReq {
  string app_id = 1; // 应用 ID
  string refresh_token = 2; // 刷新令牌
}

message RefreshTokenRes {
  string access_token = 1; // 新的访问令牌
  string refresh_token = 2; // 新的刷新令牌
  int64 expires_in = 3; // 过期时间（秒）
}

// ==================== 推送机器人（Bot）管理 ====================

// 创建推送机器人
message CreateBotReq {
  string group_id = 1; // 目标群组 ID
  string bot_id = 2; // 机器人用户 ID（由 user_rpc 生成）
}

message CreateBotRes {
  uint32 id = 1; // 机器人 ID（open_bots.id）
  string bot_id = 2; // 机器人用户 ID
  string token = 3; // Webhook Token
  string webhook_url = 4; // Webhook 基础 URL（不含 token）
}

// 删除推送机器人（软删除，设置 status=0）
message DeleteBotReq {
  uint32 id = 1; // open_bots.id
}

message DeleteBotRes {}

// 重置签名密钥
message ResetBotSecretReq {
  uint32 id = 1;
}

message ResetBotSecretRes {
  string signature_secret = 1; // 新密钥
}

// 获取推送机器人信息
message GetBotInfoReq {
  string bot_id = 1; // 机器人用户ID
}

message BotSecurity {
  bool keywords_enabled = 1;
  repeated string keywords = 2;
  bool ip_whitelist_enabled = 3;
  repeated string ip_whitelist = 4;
  bool signature_enabled = 5;
  string signature_secret = 6;
}

message GetBotInfoRes {
  uint32 id = 1; // open_bots.id
  string bot_id = 2; // 机器人用户ID
  string token = 3; // Webhook Token
  BotSecurity security = 4; // 安全设置
}

// 记录 Webhook 回调日志（供 chat 等域通过 RPC 写入，不直连 beaver_open）
message SaveWebhookLogReq {
  string config_id = 1; // 配置 ID
  string app_id = 2; // 应用 ID
  string event_type = 3; // 事件类型
  int32 status = 4; // 0 失败 1 成功
}

message SaveWebhookLogRes {}

// ==================== 智能机器人 Webhook ====================

// 根据 IM 用户 ID 反查智能机器人
message GetRobotByUserIDReq {
  string robot_user_id = 1; // string Robot 的 IM 用户 ID
}

message GetRobotByUserIDRes {
  bool found = 1; // bool 是否找到对应 Robot
  string app_id = 2; // string 所属应用 ID
  string robot_user_id = 3; // string Robot 的 IM 用户 ID
  bool enable_single_chat = 4; // bool 是否启用私聊
  bool enable_group_chat = 5; // bool 是否启用群聊
  bool enable_at_mention = 6; // bool 是否启用 @ 提及
}

// 向应用已注册的 Webhook 推送开放平台事件
message DispatchPlatformEventReq {
  string app_id = 1; // string 应用 ID
  string event_type = 2; // string 事件类型，如 im.message.receive
  string event_json = 3; // string 事件内容 JSON 字符串
}

message DispatchPlatformEventRes {
  bool dispatched = 1; // bool 是否至少推送成功一次
}

service open {
  rpc ExchangeToken(ExchangeTokenReq) returns (ExchangeTokenRes); // 用授权码换取 Token
  rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoRes); // 获取用户信息
  rpc ValidateToken(ValidateTokenReq) returns (ValidateTokenRes); // 验证 Token
  rpc RefreshToken(RefreshTokenReq) returns (RefreshTokenRes); // 刷新 Token
  rpc CreateBot(CreateBotReq) returns (CreateBotRes); // 创建推送机器人
  rpc DeleteBot(DeleteBotReq) returns (DeleteBotRes); // 删除推送机器人（软删除）
  rpc ResetBotSecret(ResetBotSecretReq) returns (ResetBotSecretRes); // 重置签名密钥
  rpc GetBotInfo(GetBotInfoReq) returns (GetBotInfoRes); // 获取推送机器人信息
  rpc SaveWebhookLog(SaveWebhookLogReq) returns (SaveWebhookLogRes); // 记录 Webhook 回调日志
  rpc GetRobotByUserID(GetRobotByUserIDReq) returns (GetRobotByUserIDRes); // 根据 IM 用户 ID 反查 Robot
  rpc DispatchPlatformEvent(DispatchPlatformEventReq) returns (DispatchPlatformEventRes); // 推送开放平台事件
}

