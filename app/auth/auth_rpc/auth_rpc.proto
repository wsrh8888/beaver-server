syntax = "proto3"; //指定proto版本
package auth_rpc;

option go_package = "./auth_rpc";

// 创建用户凭证
message CreateCredentialReq {
  string user_id = 1; // 用户ID
  string password = 2; // 密码（明文，服务端会加密）
}

message CreateCredentialRes {
  bool success = 1; // 是否成功
}

// 验证密码
message VerifyPasswordReq {
  string user_id = 1; // 用户ID
  string password = 2; // 密码（明文）
}

message VerifyPasswordRes {
  bool valid = 1; // 密码是否正确
}

// 修改密码
message UpdatePasswordReq {
  string user_id = 1; // 用户ID
  string old_password = 2; // 旧密码
  string new_password = 3; // 新密码
}

message UpdatePasswordRes {
  bool success = 1; // 是否成功
}

// 获取最后登录时间
message GetLastLoginAtReq {
  string user_id = 1; // 用户ID
}

message GetLastLoginAtRes {
  int64 last_login_at = 1; // 最后登录时间戳（秒）
}

// 更新登录记录
message UpdateLoginRecordReq {
  string user_id = 1; // 用户ID
}

message UpdateLoginRecordRes {
  bool success = 1; // 是否成功
}

// 重置密码（已通过验证码等校验，无需旧密码）
message ResetPasswordReq {
  string user_id = 1;
  string new_password = 2;
}

message ResetPasswordRes {
  bool success = 1;
}

// 登录登记设备（auth 库）
message UpsertDeviceReq {
  string user_id = 1;
  string device_id = 2;
  string device_type = 3;
  string device_os = 4;
  string device_name = 5;
  string last_login_ip = 6;
}

message UpsertDeviceRes {
  bool success = 1;
}

message CheckDeviceActiveReq {
  string user_id = 1;
  string device_id = 2;
}

message CheckDeviceActiveRes {
  bool active = 1;
}

service auth {
  rpc CreateCredential(CreateCredentialReq) returns(CreateCredentialRes);
  rpc VerifyPassword(VerifyPasswordReq) returns(VerifyPasswordRes);
  rpc UpdatePassword(UpdatePasswordReq) returns(UpdatePasswordRes);
  rpc GetLastLoginAt(GetLastLoginAtReq) returns(GetLastLoginAtRes);
  rpc UpdateLoginRecord(UpdateLoginRecordReq) returns(UpdateLoginRecordRes);
  rpc ResetPassword(ResetPasswordReq) returns(ResetPasswordRes);
  rpc UpsertDevice(UpsertDeviceReq) returns(UpsertDeviceRes);
  rpc CheckDeviceActive(CheckDeviceActiveReq) returns(CheckDeviceActiveRes);
}

