syntax = "proto3"; //指定proto版本
package group_rpc;

option go_package = "./group_rpc";

message GetGroupMembersReq {
  string groupID = 1; // 群组Id
}

message GroupMemberInfo {
  string userID = 1;  // 用户Id
  string username = 2; // 用户名
  string avatar = 3;   // 用户头像
}

message GetGroupMembersRes {
  repeated GroupMemberInfo members = 1; // 成员信息列表
}

// 获取用户群组中的其他成员ID列表
message GetUserGroupMembersReq {
  string userID = 1; // 用户ID
}

message GetUserGroupMembersRes {
  repeated string memberIDs = 1; // 群成员ID列表（去重后的所有群友）
}

// 获取用户加入的群组ID列表
message GetUserGroupIDsReq {
  string userID = 1; // 用户ID
}

message GetUserGroupIDsRes {
  repeated string groupIDs = 1; // 用户加入的群组ID列表
}

// 通过ID获取群组列表
message GetGroupsListByIdsReq {
  repeated string groupIDs = 1; // 群组ID列表
  int64 since = 2; // 时间戳，从此时间戳之后获取变更的记录
}

message GroupListById {
  string groupID = 1; // 群组ID
  string name = 2; // 群组名称
  string avatar = 3; // 群组头像
  string description = 4; // 群组描述
  int64 version = 5; // 版本号
  int64 createdAt = 6; // 创建时间
  int64 updatedAt = 7; // 更新时间
}

message GetGroupsListByIdsRes {
  repeated GroupListById groups = 1; // 群组列表
}

// 通过ID获取群成员列表
message GetGroupMembersListByIdsReq {
  repeated string groupIDs = 1; // 群组ID列表
  int64 since = 2; // 时间戳，从此时间戳之后获取变更的记录
}

message GroupMemberListById {
  string groupID = 1; // 群组ID
  string userID = 2; // 用户ID
  int32 role = 3; // 成员角色 (1: 群主, 2: 管理员, 3: 普通成员)
  int64 joinedAt = 4; // 加入时间
  int64 version = 5; // 版本号
}

message GetGroupMembersListByIdsRes {
  repeated GroupMemberListById members = 1; // 群成员列表
}

// 通过ID获取入群申请列表
message GetGroupJoinRequestsListByIdsReq {
  repeated string groupIDs = 1; // 群组ID列表
  int64 since = 2; // 时间戳，从此时间戳之后获取变更的记录
}

message GroupJoinRequestListById {
  string requestID = 1; // 申请ID
  string groupID = 2; // 群组ID
  string userID = 3; // 申请用户ID
  string message = 4; // 申请消息
  int32 status = 5; // 申请状态 (0: 待审核, 1: 已通过, 2: 已拒绝)
  int64 appliedAt = 6; // 申请时间
  int64 version = 7; // 版本号
}

message GetGroupJoinRequestsListByIdsRes {
  repeated GroupJoinRequestListById requests = 1; // 入群申请列表
}

// 获取用户的群组申请（包括发出的申请和管理的申请）
message GetUserGroupRequestVersionsReq {
  string userID = 1; // 用户ID
  int64 since = 2; // 时间戳，从此时间戳之后获取变更的记录
}

message GetUserGroupRequestVersionsRes {
  repeated GroupRequestVersionItem versions = 1; // 版本列表
}

message GroupRequestVersionItem {
  string groupID = 1; // 群组ID
  int64 version = 2; // 最新版本号
}

message CanSendGroupMessageReq {
  string group_id = 1;
  string user_id = 2;
}

message CanSendGroupMessageRes {
  bool allowed = 1;
  string reason = 2;
}

// 添加群成员（供开放平台 Robot 入群等内部调用）
message AddGroupMemberReq {
  string group_id = 1; // string 群组 ID
  string user_id = 2; // string 要加入的用户 ID
  string operated_by = 3; // string 操作者 ID（如 app_id），可为空
}

message AddGroupMemberRes {
  bool added = 1; // bool 是否新加入（已在群内则为 false）
  int64 member_version = 2; // int64 群成员列表版本号
}

// 移除群成员
message RemoveGroupMemberReq {
  string group_id = 1; // string 群组 ID
  string user_id = 2; // string 要移除的用户 ID
  string operated_by = 3; // string 操作者 ID（如 app_id），可为空
  bool kick = 4; // bool true=被踢(status=3)，false=退出(status=2)
}

message RemoveGroupMemberRes {
  int64 member_version = 1; // int64 群成员列表版本号
}

// ==================== 群组管理（通用）====================

message GroupItem {
  uint64 id = 1; // uint64 记录 ID
  string group_id = 2; // string 群组 ID
  int32 type = 3; // int32 群类型
  string title = 4; // string 群名称
  string avatar = 5; // string 群头像
  string creator_id = 6; // string 创建者 ID
  string notice = 7; // string 群公告
  int32 status = 8; // int32 群状态
  bool mute_all = 9; // bool 是否全员禁言
  string created_at = 10; // string 创建时间 RFC3339
  string updated_at = 11; // string 更新时间 RFC3339
}

message ListGroupsReq {
  int32 page = 1; // int32 页码
  int32 page_size = 2; // int32 每页条数
  int32 status = 3; // int32 状态筛选，0 表示全部
  int32 type = 4; // int32 类型筛选，0 表示全部
  string keywords = 5; // string 群名关键词，可选
  uint64 id = 6; // uint64 记录 ID，可选
  string group_id = 7; // string 业务群组 ID，可选
}

message ListGroupsRes {
  int64 total = 1; // int64 总数
  repeated GroupItem list = 2; // array 群组列表
}

message UpdateGroupReq {
  uint64 id = 1; // uint64 记录 ID
  string title = 2; // string 群名称，空表示不修改
  string avatar = 3; // string 群头像，空表示不修改
  string notice = 4; // string 群公告，空表示不修改
  int32 status = 5; // int32 群状态，0 表示不修改
  optional bool mute_all = 6; // bool 全员禁言，可选
}

message UpdateGroupRes {}

message GroupMemberItem {
  uint64 id = 1; // uint64 记录 ID
  string group_id = 2; // string 群组 ID
  string user_id = 3; // string 用户 ID
  int32 role = 4; // int32 成员角色
  int32 status = 5; // int32 成员状态
  int32 prohibition_minutes = 6; // int32 禁言剩余分钟，0 表示未禁言
  string created_at = 7; // string 创建时间 RFC3339
  string updated_at = 8; // string 更新时间 RFC3339
}

message ListGroupMembersReq {
  string group_id = 1; // string 群组 ID
  int32 page = 2; // int32 页码
  int32 page_size = 3; // int32 每页条数
  int32 role = 4; // int32 角色筛选，0 表示全部
  int32 status = 5; // int32 状态筛选，0 表示全部
}

message ListGroupMembersRes {
  int64 total = 1; // int64 总数
  repeated GroupMemberItem list = 2; // array 成员列表
}

message UpdateGroupMemberReq {
  uint64 id = 1; // uint64 成员记录 ID
  optional int32 role = 2; // int32 角色，可选
  optional int32 mute_minutes = 3; // int32 禁言分钟，0 解除，可选
}

message UpdateGroupMemberRes {}

service group {
  rpc GetGroupMembers(GetGroupMembersReq) returns (GetGroupMembersRes); // 获取群成员列表
  rpc GetUserGroupMembers(GetUserGroupMembersReq) returns (GetUserGroupMembersRes); // 获取用户群组中的其他成员ID列表
  rpc GetUserGroupIDs(GetUserGroupIDsReq) returns (GetUserGroupIDsRes); // 获取用户加入的群组ID列表
  rpc GetGroupsListByIds(GetGroupsListByIdsReq) returns (GetGroupsListByIdsRes); // 通过ID获取群组列表
  rpc GetGroupMembersListByIds(GetGroupMembersListByIdsReq) returns (GetGroupMembersListByIdsRes); // 通过ID获取群成员列表
  rpc GetGroupJoinRequestsListByIds(GetGroupJoinRequestsListByIdsReq) returns (GetGroupJoinRequestsListByIdsRes); // 通过ID获取入群申请列表
  rpc GetUserGroupRequestVersions(GetUserGroupRequestVersionsReq) returns (GetUserGroupRequestVersionsRes); // 获取用户群组申请版本信息
  rpc CanSendGroupMessage(CanSendGroupMessageReq) returns (CanSendGroupMessageRes); // 校验用户是否可在群内发消息
  rpc AddGroupMember(AddGroupMemberReq) returns (AddGroupMemberRes); // 添加群成员
  rpc RemoveGroupMember(RemoveGroupMemberReq) returns (RemoveGroupMemberRes); // 移除群成员

  rpc ListGroups(ListGroupsReq) returns (ListGroupsRes);
  rpc UpdateGroup(UpdateGroupReq) returns (UpdateGroupRes);
  rpc ListGroupMembers(ListGroupMembersReq) returns (ListGroupMembersRes);
  rpc UpdateGroupMember(UpdateGroupMemberReq) returns (UpdateGroupMemberRes);
}

// goctl rpc protoc group_rpc.proto --go_out=./types --go-grpc_out=./types --zrpc_out=.