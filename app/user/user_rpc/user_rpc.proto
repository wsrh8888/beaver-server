syntax = "proto3"; //指定proto版本
package user_rpc;

option go_package = "./user_rpc";


message UserCreateReq {
  string phone = 1; // 手机号（与email二选一）
  int32 source = 2; // 注册来源：1-手机号注册，2-邮箱注册
  string email = 3; // 邮箱（与phone二选一）
  string nick_name = 4; // 昵称（可选）
  int32 user_type = 5; // 用户类型：0-普通用户，1-机器人（可选，默认0）
}

message UserCreateRes {
  string userID = 1;
}

message UserInfoReq {
  string userID = 1;
}

message UserInfoRes {
  UserInfo user_info = 1; // 用户信息
}
 

 message IsFriendReq {
  string user1 = 1;
  string user2 = 2;
}

message IsFriendRes {
  bool is_friend = 1;
}

message UserInfo {
  string user_id = 1; // 用户ID
  string nick_name = 2;
  string avatar = 3;
  int64 version = 4; // 用户版本号，用于同步
  string email = 5;
  string abstract = 6;
}

message UserVersionInfo {
  string user_id = 1;
  int64 version = 2;
}

message UserVersionsReq {
  repeated string user_ids = 1;
}

message UserVersionsRes {
  map<string, int64> user_versions = 1; // user_id -> version
}

message UserListInfoReq {
  repeated string user_id_list = 1;
  int64 since_timestamp = 2; // 可选：从这个时间戳之后查询更新的用户，不传则返回所有
}

message UserListInfoRes {
  map<string, UserInfo> user_info = 1; //用户配置的json
}

message SearchUserReq {
  string keyword = 1; // 搜索关键词（邮箱或用户ID）
  string type = 2; // 搜索类型：email 或 userId
}

message SearchUserRes {
  UserInfo user_info = 1; // 用户信息
}

service user {
  rpc UserCreate(UserCreateReq) returns(UserCreateRes);
  rpc UserInfo(UserInfoReq) returns(UserInfoRes);
  rpc IsFriend(IsFriendReq) returns(IsFriendRes);
  rpc SearchUser(SearchUserReq) returns(SearchUserRes);
  rpc UserListInfo(UserListInfoReq) returns(UserListInfoRes);
  rpc UserVersions(UserVersionsReq) returns(UserVersionsRes);
}

