Name: gateway
Addr: 0.0.0.0:20800
etcd: 127.0.0.1:2379
Log:
  Encoding: plain
  TimeFormat: 2006-01-02T15:04:05
  Stat: false
Auth:
  AccessSecret: robert
  AccessExpire: 3600
Limit:
  Enable: true
  Rate: 100    # 每秒请求数
  Burst: 200   # 峰值容忍
# 无需 Gateway 鉴权（公开接口）
PublicList:
  - /api/auth/auth_public/.*
  - /api/platform/track_public/.*
  - /api/platform/update_public/.*
  - /api/open/.*_public/.*
  - /api/file/preview/.*
  - /api/call/v1/webhook
# 下游服务自带鉴权中间件（如 open_portal DeveloperAuthMiddleware）
CustomAuthList:
  - /api/open_portal/.*
# /api/open/oauth_secret/* Gateway 校验 App-Id/App-Secret 请求头；其余 /api/open/* 默认放行（logic 校验）
