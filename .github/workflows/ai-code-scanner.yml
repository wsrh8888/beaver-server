name: AI Code Security Scanner

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨2点运行
  workflow_dispatch:      # 也可以手动触发

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整历史
      
      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # 使用 3.11 避免版本警告
      
      - name: 安装扫描工具
        run: |
          pip install semgrep google-genai  # 使用新版 API
      
      - name: 运行代码扫描
        run: |
          semgrep --config=auto --json -o scan_results.json || true
      
      - name: AI 分析并生成修复
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'PYTHON_SCRIPT'
          import json
          import os
          from google import genai
          
          # 配置 Gemini 3
          client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
          
          # 读取扫描结果
          try:
              with open('scan_results.json', 'r') as f:
                  data = json.load(f)
          except FileNotFoundError:
              print("没有扫描结果文件")
              exit(0)
          
          if not data.get('results'):
              print("没有发现问题")
              exit(0)
          
          # 只处理前3个高危问题（避免刷屏）
          issues = [r for r in data['results'] 
                   if r.get('extra', {}).get('severity') in ['ERROR', 'WARNING']][:3]
          
          if not issues:
              print("没有高危问题")
              exit(0)
          
          # 构建 AI 提示词
          prompt = f"""
          你是一个专业的代码安全专家。以下是代码扫描发现的安全问题：
          
          {json.dumps(issues, indent=2, ensure_ascii=False)}
          
          请针对每个问题：
          1. 判断是否为真实的安全漏洞（排除误报）
          2. 如果是真实漏洞，生成修复后的完整代码
          3. 输出格式必须是标准的 unified diff 格式
          
          要求：
          - 只修复确认的漏洞，不要改动其他代码
          - diff 格式必须严格遵守 Git 标准
          - 包含文件路径、行号等信息
          """
          
          # 调用 Gemini 3 Pro
          response = client.models.generate_content(
              model='gemini-2.5-pro',  # 使用 Gemini 3
              contents=prompt
          )
          
          fix_content = response.text
          
          # 保存修复补丁
          with open('fix.patch', 'w') as f:
              f.write(fix_content)
          
          print("AI 分析完成")
          print(fix_content)
          PYTHON_SCRIPT
      
      - name: 应用修复并创建 PR
        if: success()
        run: |
          # 配置 Git
          git config user.name "AI Security Bot"
          git config user.email "bot@github-actions"
          
          # 创建新分支
          BRANCH_NAME="ai-security-fix-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH_NAME
          
          # 尝试应用补丁
          if git apply fix.patch 2>/dev/null; then
            git add .
            git commit -m "🤖 [AI自动修复] 安全漏洞修复
            
            本 PR 由 AI 自动生成，请仔细审核后再合并。
            
            修复内容：
            $(cat fix.patch | head -n 20)
            
            ---
            ⚠️ 重要提示：
            - 此 PR 必须经过人工审核
            - 请运行完整的测试套件
            - 确认修复不会引入新问题"
            
            git push origin $BRANCH_NAME
            
            # 创建 Pull Request
            gh pr create \
              --title "🤖 [AI自动修复] 代码安全漏洞" \
              --body "**⚠️ 此 PR 由 AI 自动生成，请务必仔细审核！**
              
              ## 修复内容
              \`\`\`diff
              $(cat fix.patch | head -n 50)
              \`\`\`
              
              ## 检查清单
              - [ ] 已审核所有代码改动
              - [ ] 已运行测试套件
              - [ ] 确认修复有效且安全
              
              ---
              *由 GitHub Actions 自动触发*" \
              --label "security,ai-generated,needs-review"
          else
            echo "❌ 补丁应用失败，请手动检查"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
