name: AI Code Security Scanner

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨2点运行
  workflow_dispatch:      # 也可以手动触发

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整历史
      
      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # 使用 3.11 避免版本警告
      
      - name: 安装扫描工具
        run: |
          pip install semgrep google-genai openai
      
      - name: 运行代码扫描
        run: |
          semgrep --config=auto --json -o scan_results.json || true
      
      # 密钥与切换方式（Settings → Secrets and variables）
      # - Secrets: DEEPSEEK_API_KEY、GEMINI_API_KEY（按 AI_PROVIDER 二选一必填；默认 deepseek）
      # - Variables（可选）: AI_PROVIDER=deepseek|gemini，GEMINI_MODEL，DEEPSEEK_MODEL，DEEPSEEK_BASE_URL
      - name: AI 分析并生成修复
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
        run: |
          python << 'PYTHON_SCRIPT'
          import json
          import os
          import time
          
          MAX_ATTEMPTS = 5
          BASE_DELAY_SEC = 5
          
          def env_default(name, default):
              v = os.environ.get(name)
              if v is None:
                  return default
              v = v.strip()
              return v if v else default
          
          def retry_transient(attempt_fn, exc_types):
              for attempt in range(MAX_ATTEMPTS):
                  try:
                      return attempt_fn()
                  except exc_types as e:
                      try:
                          from openai import APIConnectionError
                          conn_err = isinstance(e, APIConnectionError)
                      except ImportError:
                          conn_err = False
                      status = getattr(e, "status_code", None) or getattr(e, "code", None)
                      transient = conn_err or status in (429, 500, 502, 503, 504)
                      if transient and attempt < MAX_ATTEMPTS - 1:
                          delay = min(60, BASE_DELAY_SEC * (2 ** attempt))
                          reason = f"HTTP {status}" if status is not None else "网络或连接异常"
                          print(
                              f"API 暂不可用 ({reason})，"
                              f"第 {attempt + 1}/{MAX_ATTEMPTS} 次尝试，{delay} 秒后重试..."
                          )
                          time.sleep(delay)
                      else:
                          raise
          
          def generate_text(prompt):
              provider = env_default("AI_PROVIDER", "deepseek").lower()
              if provider == "gemini":
                  from google import genai
                  from google.genai.errors import ServerError
                  key = env_default("GEMINI_API_KEY", "")
                  if not key:
                      raise SystemExit("已选择 gemini 但未设置 GEMINI_API_KEY")
                  model = env_default("GEMINI_MODEL", "gemini-2.5-flash")
                  client = genai.Client(api_key=key)
                  
                  def once():
                      return client.models.generate_content(model=model, contents=prompt)
                  
                  resp = retry_transient(once, ServerError)
                  return (resp.text or "").strip()
              
              if provider == "deepseek":
                  from openai import APIConnectionError, APIStatusError, OpenAI
                  key = env_default("DEEPSEEK_API_KEY", "")
                  if not key:
                      raise SystemExit("已选择 deepseek 但未设置 DEEPSEEK_API_KEY")
                  model = env_default("DEEPSEEK_MODEL", "deepseek-chat")
                  base_url = env_default("DEEPSEEK_BASE_URL", "https://api.deepseek.com")
                  client = OpenAI(api_key=key, base_url=base_url)
                  
                  def once():
                      comp = client.chat.completions.create(
                          model=model,
                          messages=[{"role": "user", "content": prompt}],
                      )
                      return (comp.choices[0].message.content or "").strip()
                  
                  return retry_transient(once, (APIStatusError, APIConnectionError))
              
              raise SystemExit(f"不支持的 AI_PROVIDER: {provider}，请使用 gemini 或 deepseek")
          
          # 读取扫描结果
          try:
              with open('scan_results.json', 'r') as f:
                  data = json.load(f)
          except FileNotFoundError:
              print("没有扫描结果文件")
              exit(0)
          
          if not data.get('results'):
              print("没有发现问题")
              exit(0)
          
          # 只处理前3个高危问题（避免刷屏）
          issues = [r for r in data['results'] 
                   if r.get('extra', {}).get('severity') in ['ERROR', 'WARNING']][:3]
          
          if not issues:
              print("没有高危问题")
              exit(0)
          
          # 构建 AI 提示词
          prompt = f"""
          你是一个专业的代码安全专家。以下是代码扫描发现的安全问题：
          
          {json.dumps(issues, indent=2, ensure_ascii=False)}
          
          请针对每个问题：
          1. 判断是否为真实的安全漏洞（排除误报）
          2. 如果是真实漏洞，生成修复后的完整代码
          3. 输出格式必须是标准的 unified diff 格式
          
          要求：
          - 只修复确认的漏洞，不要改动其他代码
          - diff 格式必须严格遵守 Git 标准
          - 包含文件路径、行号等信息
          """
          
          # 按 AI_PROVIDER 调用对应 API（含瞬时过载重试）
          fix_content = generate_text(prompt)
          
          # 保存修复补丁
          with open('fix.patch', 'w') as f:
              f.write(fix_content)
          
          print("AI 分析完成")
          print(fix_content)
          PYTHON_SCRIPT
      
      - name: 应用修复并创建 PR
        if: success()
        run: |
          # 配置 Git
          git config user.name "AI Security Bot"
          git config user.email "bot@github-actions"
          
          # 创建新分支
          BRANCH_NAME="ai-security-fix-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH_NAME
          
          # 尝试应用补丁
          if git apply fix.patch 2>/dev/null; then
            git add .
            git commit -m "🤖 [AI自动修复] 安全漏洞修复
            
            本 PR 由 AI 自动生成，请仔细审核后再合并。
            
            修复内容：
            $(cat fix.patch | head -n 20)
            
            ---
            ⚠️ 重要提示：
            - 此 PR 必须经过人工审核
            - 请运行完整的测试套件
            - 确认修复不会引入新问题"
            
            git push origin $BRANCH_NAME
            
            # 创建 Pull Request
            gh pr create \
              --title "🤖 [AI自动修复] 代码安全漏洞" \
              --body "**⚠️ 此 PR 由 AI 自动生成，请务必仔细审核！**
              
              ## 修复内容
              \`\`\`diff
              $(cat fix.patch | head -n 50)
              \`\`\`
              
              ## 检查清单
              - [ ] 已审核所有代码改动
              - [ ] 已运行测试套件
              - [ ] 确认修复有效且安全
              
              ---
              *由 GitHub Actions 自动触发*" \
              --label "security,ai-generated,needs-review"
          else
            echo "❌ 补丁应用失败，请手动检查"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
