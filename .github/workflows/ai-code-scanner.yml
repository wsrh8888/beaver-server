name: AI Code Security Scanner



on:

  schedule:

    - cron: '0 2 * * 0'  # 每周日凌晨2点运行

  workflow_dispatch:      # 也可以手动触发



jobs:

  scan-and-fix:

    runs-on: ubuntu-latest



    steps:

      - name: 检出代码

        uses: actions/checkout@v3

        with:

          fetch-depth: 0



      - name: 安装 Python

        uses: actions/setup-python@v4

        with:

          python-version: '3.11'



      - name: 安装扫描工具

        run: |

          pip install semgrep google-genai openai



      - name: 运行代码扫描

        run: |

          semgrep --config=auto --json -o scan_results.json || true



      # Secrets: DEEPSEEK_API_KEY / GEMINI_API_KEY；Variables: AI_PROVIDER、各 MODEL、DEEPSEEK_BASE_URL

      - name: AI 分析并写回修复

        env:

          AI_PROVIDER: ${{ vars.AI_PROVIDER }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}

          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}

          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}

        run: |

          python << 'PYTHON_SCRIPT'

          import json

          import os

          import time



          def resolve_repo_file_path(rel):

              if not rel or rel == "/dev/null":

                  return rel

              candidates = []

              seen = set()

              def add(p):

                  if p and p not in seen:

                      seen.add(p)

                      candidates.append(p)

              add(rel)

              if not rel.startswith("app/"):

                  add("app/" + rel)

              if rel.startswith("app/"):

                  add(rel[4:])

              for c in candidates:

                  if os.path.isfile(c):

                      return c

              return rel



          MAX_ATTEMPTS = 5

          BASE_DELAY_SEC = 5



          def env_default(name, default):

              v = os.environ.get(name)

              if v is None:

                  return default

              v = v.strip()

              return v if v else default



          def retry_transient(attempt_fn, exc_types):

              for attempt in range(MAX_ATTEMPTS):

                  try:

                      return attempt_fn()

                  except exc_types as e:

                      try:

                          from openai import APIConnectionError

                          conn_err = isinstance(e, APIConnectionError)

                      except ImportError:

                          conn_err = False

                      status = getattr(e, "status_code", None) or getattr(e, "code", None)

                      transient = conn_err or status in (429, 500, 502, 503, 504)

                      if transient and attempt < MAX_ATTEMPTS - 1:

                          delay = min(60, BASE_DELAY_SEC * (2 ** attempt))

                          reason = f"HTTP {status}" if status is not None else "网络或连接异常"

                          print(

                              f"API 暂不可用 ({reason})，"

                              f"第 {attempt + 1}/{MAX_ATTEMPTS} 次尝试，{delay} 秒后重试..."

                          )

                          time.sleep(delay)

                      else:

                          raise



          def strip_text_fence(text):

              t = (text or "").strip().replace("\r\n", "\n")

              lines = t.splitlines()

              if lines and lines[0].strip().startswith("```"):

                  lines = lines[1:]

                  while lines and lines[-1].strip().startswith("```"):

                      lines = lines[:-1]

              return "\n".join(lines).strip()



          def generate_text(prompt):

              provider = env_default("AI_PROVIDER", "deepseek").lower()

              if provider == "gemini":

                  from google import genai

                  from google.genai.errors import ServerError

                  key = env_default("GEMINI_API_KEY", "")

                  if not key:

                      raise SystemExit("已选择 gemini 但未设置 GEMINI_API_KEY")

                  model = env_default("GEMINI_MODEL", "gemini-2.5-flash")

                  client = genai.Client(api_key=key)



                  def once():

                      return client.models.generate_content(model=model, contents=prompt)



                  resp = retry_transient(once, ServerError)

                  return (resp.text or "").strip()



              if provider == "deepseek":

                  from openai import APIConnectionError, APIStatusError, OpenAI

                  key = env_default("DEEPSEEK_API_KEY", "")

                  if not key:

                      raise SystemExit("已选择 deepseek 但未设置 DEEPSEEK_API_KEY")

                  model = env_default("DEEPSEEK_MODEL", "deepseek-chat")

                  base_url = env_default("DEEPSEEK_BASE_URL", "https://api.deepseek.com")

                  client = OpenAI(api_key=key, base_url=base_url)



                  def once():

                      comp = client.chat.completions.create(

                          model=model,

                          messages=[{"role": "user", "content": prompt}],

                      )

                      return (comp.choices[0].message.content or "").strip()



                  return retry_transient(once, (APIStatusError, APIConnectionError))



              raise SystemExit(f"不支持的 AI_PROVIDER: {provider}，请使用 gemini 或 deepseek")



          def load_issue_files(issues):

              seen = set()

              paths = []

              for r in issues:

                  raw = (r.get("path") or "").strip()

                  if not raw:

                      continue

                  resolved = resolve_repo_file_path(raw)

                  if not os.path.isfile(resolved):

                      print(f"跳过（文件不存在）: {raw} -> {resolved}")

                      continue

                  if resolved not in seen:

                      seen.add(resolved)

                      paths.append(resolved)

              bundle = {}

              for p in paths:

                  with open(p, "r", encoding="utf-8", errors="replace") as fh:

                      bundle[p] = fh.read()

              return paths, bundle



          def parse_fixes_json(text):

              t = strip_text_fence(text)

              lo, hi = t.find("["), t.rfind("]")

              if lo == -1 or hi <= lo:

                  raise ValueError("响应中未找到 JSON 数组")

              return json.loads(t[lo : hi + 1])



          def match_allowed_path(model_path, allowed_paths):

              if not model_path or not model_path.strip():

                  return None

              mp = model_path.strip()

              candidates = [mp, resolve_repo_file_path(mp)]

              allowed_norm = {os.path.normpath(a): a for a in allowed_paths}

              for c in candidates:

                  if c in allowed_paths:

                      return c

                  n = os.path.normpath(c)

                  if n in allowed_norm:

                      return allowed_norm[n]

              return None



          try:

              with open("scan_results.json", "r") as f:

                  data = json.load(f)

          except FileNotFoundError:

              print("没有扫描结果文件")

              exit(0)



          if not data.get("results"):

              print("没有发现问题")

              exit(0)



          issues = [

              r

              for r in data["results"]

              if r.get("extra", {}).get("severity") in ["ERROR", "WARNING"]

          ][:3]



          if not issues:

              print("没有高危问题")

              exit(0)



          paths, bundle = load_issue_files(issues)

          if not paths:

              print("没有可读取的本地文件，无法生成基于实盘的修复")

              exit(0)



          file_sections = []

          for p in paths:

              file_sections.append(

                  "===== FILE: " + p + " =====\n" + bundle[p] + "\n===== END " + p + " ====="

              )



          nl = "\n"

          fmt_line = (

              "每个元素格式："

              '{"path":"<与上方 FILE 行一致>","content":"<该文件修复后的完整内容>"}'

              "\n"

          )

          prompt = (

              "你是代码安全专家。下面包含 Semgrep 报告，以及**当前仓库里这些文件的完整原文**（以 FILE/END 为界）。\n"

              "你必须**只根据这些原文**设计修复，禁止臆造不存在的代码行或格式。\n\n"

              "Semgrep 结果（JSON）：\n"

              + json.dumps(issues, indent=2, ensure_ascii=False)

              + "\n\n仓库文件原文：\n"

              + nl.join(file_sections)

              + "\n\n请判断哪些是真实漏洞（排除误报）。对需要修改的文件，输出**一个 JSON 数组**，且仅包含需要改动的文件。\n"

              + fmt_line

              + "要求：\n"

              + "- path 必须与「FILE:」后的路径字符串完全一致（含 app/ 等前缀）\n"

              + "- content 为整文件全文，UTF-8 文本\n"

              + "- 不要改动与漏洞无关的逻辑；若某文件无需修改，不要出现在数组中\n"

              + "- 若无需任何修改，输出空数组 []\n"

              + "- 只输出 JSON，不要 markdown 代码块、不要任何解释文字\n"

          )



          raw = generate_text(prompt)

          try:

              fixes = parse_fixes_json(raw)

          except (json.JSONDecodeError, ValueError) as e:

              print("模型返回无法解析为 JSON：", e)

              print("---- 原始响应前 2000 字 ----")

              print((raw or "")[:2000])

              raise SystemExit(1)



          if not isinstance(fixes, list):

              raise SystemExit("JSON 顶层必须是数组")



          if len(fixes) == 0:

              print("模型判定无需修改或返回空数组")

              with open("ai_fix_applied.flag", "w") as ff:

                  ff.write("0")

              exit(0)



          allowed = set(paths)

          for item in fixes:

              if not isinstance(item, dict):

                  raise SystemExit("数组元素必须为对象")

              mp = item.get("path")

              content = item.get("content")

              if content is None:

                  raise SystemExit("缺少 content 字段")

              if not isinstance(content, str):

                  raise SystemExit("content 必须为字符串")

              target = match_allowed_path(mp, allowed)

              if not target:

                  raise SystemExit(f"path 不在允许列表内: {mp}")

              with open(target, "w", encoding="utf-8", newline="\n") as out:

                  out.write(content)

              print(f"已写入: {target}")



          with open("ai_fix_applied.flag", "w") as ff:

              ff.write("1")

          print("AI 修复已写入工作区")

          PYTHON_SCRIPT



      - name: 提交并创建 PR

        if: success()

        run: |

          git config user.name "AI Security Bot"

          git config user.email "bot@github-actions"



          if [ ! -f ai_fix_applied.flag ] || [ "$(cat ai_fix_applied.flag)" != "1" ]; then

            echo "本次未产生需提交的 AI 文件修改，跳过 PR"

            exit 0

          fi



          if git diff --quiet && git diff --cached --quiet; then

            echo "工作区无改动，跳过"

            exit 0

          fi



          BRANCH_NAME="ai-security-fix-$(date +%Y%m%d-%H%M%S)"

          git checkout -b "$BRANCH_NAME"

          git add -A

          git status



          git diff --cached --stat > _diff_stat.txt

          git diff --cached | head -n 120 > _diff_head.txt



          python << 'WRITE_FILES'

          ds = open("_diff_stat.txt", encoding="utf-8").read()

          dh = open("_diff_head.txt", encoding="utf-8").read()

          commit_msg = (

              "\U0001f916 [AI自动修复] 安全漏洞修复\n\n"

              "本 PR 由 AI 自动生成，请仔细审核后再合并。\n\n"

              "变更统计：\n"

              + ds

              + "\n\n---\n重要提示：请人工审核并运行测试。\n"

          )

          pr_body = (

              "**\u26a0\ufe0f 此 PR 由 AI 自动生成，请务必仔细审核。**\n\n"

              "## 变更统计\n```\n"

              + ds

              + "\n```\n\n## 差异预览（前 120 行）\n```diff\n"

              + dh

              + "\n```\n\n## 检查清单\n"

              + "- [ ] 已审核所有代码改动\n"

              + "- [ ] 已运行测试套件\n"

              + "- [ ] 确认修复有效且安全\n"

          )

          open("_commit_msg.txt", "w", encoding="utf-8").write(commit_msg)

          open("_pr_body.txt", "w", encoding="utf-8").write(pr_body)

          WRITE_FILES



          git commit -F _commit_msg.txt

          git push origin "$BRANCH_NAME"



          gh pr create \

            --title "🤖 [AI自动修复] 代码安全漏洞" \

            --body-file _pr_body.txt \

            --label "security,ai-generated,needs-review"

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


