# CodeQL 扫 Go → 上传「安全」页；SARIF 再交给 issue-injector 建/更新 Issue
name: CodeQL

on:
  # 仅当直接推到 master 时触发（推到 main 不会触发这段）
  push:
    branches: [master]
  # PR 的目标分支是 master 时触发（来源分支可以是任意名）
  pull_request:
    branches: [master]
  # 定时：用的是「默认分支」上的这份 workflow；界面里常显示成默认分支（例如 main），不是 push 到了 main
  schedule:
    - cron: "28 23 * * 3"
  # 网页 Actions 里「Run workflow」手动跑
  workflow_dispatch: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # 上报 Code scanning（安全页）
      issues: write # issue-injector 建 Issue / 标签
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: autobuild # Go 由 Action 自动构建；失败再改 manual 并自己写编译命令

      - name: 分析并生成 SARIF
        id: codeql_analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go" # 与上传结果分类对应，多语言时可区分
          output: ${{ github.workspace }}/codeql-sarif # SARIF 输出目录，供下面步骤读

      - name: 查找 SARIF 文件
        id: codeql_sarif
        if: success()
        shell: bash
        run: |
          dir="${{ steps.codeql_analyze.outputs['sarif-output'] }}"
          if [ -z "$dir" ] || [ ! -d "$dir" ]; then
            echo "file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          f=$(find "$dir" -maxdepth 1 -name '*.sarif' | head -n 1)
          if [ -z "$f" ] || [ ! -f "$f" ]; then
            echo "file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "file=$f" >> "$GITHUB_OUTPUT"

      # 不用 scherersebastian/issue-injector 的 marketplace Action：它在仓库根目录执行
      # python issue-injector.py，脚本实际在 Action 包里，会报「找不到 issue-injector.py」。
      # 这里改为拉取同版本脚本到 /tmp 再跑（非 AI，无 prompt；按 SARIF 里规则的 severity 过滤）。
      - name: 根据 SARIF 创建或更新 Issue
        if: success() && steps.codeql_sarif.outputs.file != ''
        env:
          SARIF_FILE: ${{ steps.codeql_sarif.outputs.file }}
          # CodeQL 多数告警在 SARIF 里是 error；之前用 warning 会筛成 0 条、不建 Issue
          SEVERITY: error
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        shell: bash
        run: |
          python3 -m pip install -q requests
          curl -fsSL -o /tmp/issue-injector.py \
            https://raw.githubusercontent.com/scherersebastian/issue-injector/v1.0.0/issue-injector.py
          python3 /tmp/issue-injector.py
