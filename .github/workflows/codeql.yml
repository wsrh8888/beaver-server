# CodeQL 扫描 Go；结果上传「安全」页；并按 SARIF 自动建/更新 Issue（issue-injector）
name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "28 23 * * 3"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: autobuild

      - name: 分析并生成 SARIF
        id: codeql_analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
          output: ${{ github.workspace }}/codeql-sarif

      - name: 查找 SARIF 文件
        id: codeql_sarif
        if: success()
        shell: bash
        run: |
          dir="${{ steps.codeql_analyze.outputs['sarif-output'] }}"
          if [ -z "$dir" ] || [ ! -d "$dir" ]; then
            echo "file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          f=$(find "$dir" -maxdepth 1 -name '*.sarif' | head -n 1)
          if [ -z "$f" ] || [ ! -f "$f" ]; then
            echo "file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "file=$f" >> "$GITHUB_OUTPUT"

      - name: 复制 SARIF 到 /tmp
        id: sarif_staged
        if: success() && steps.codeql_sarif.outputs.file != ''
        shell: bash
        run: |
          cp "${{ steps.codeql_sarif.outputs.file }}" /tmp/codeql-for-issues.sarif
          echo "file=/tmp/codeql-for-issues.sarif" >> "$GITHUB_OUTPUT"

      - name: 根据 SARIF 创建或更新 Issue
        if: success() && steps.sarif_staged.outputs.file != ''
        uses: scherersebastian/issue-injector@v1.0.0
        with:
          SARIF_FILE: ${{ steps.sarif_staged.outputs.file }}
          SEVERITY: warning
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
