
services:
  emoji_rpc:
    image: registry.cn-hangzhou.aliyuncs.com/beaver_im/emoji_rpc:1.0.2
    container_name: emoji_rpc
    network_mode: "host"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./emojirpc.yaml:/etc/emojirpc.yaml:ro
    deploy:
      restart_policy:
        condition: any
    pull_policy: always

