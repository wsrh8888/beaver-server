
services:
  gateway_admin:
    image: wsrh8888/gateway_admin:1.0.0
    container_name: gateway_admin
    network_mode: "host"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./gateway.yaml:/etc/gateway.yaml:ro
    deploy:
      restart_policy:
        condition: any
    pull_policy: always

